name: grc
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # Core dependencies
  - numpy>=1.21.0
  - scipy>=1.7.0
  - matplotlib>=3.5.0
  - tqdm>=4.64.0
  - omegaconf>=2.3.0
  # PyTorch (CPU version - uncomment GPU version if needed)
  - pytorch>=2.0.0
  - torchvision
  - cpuonly  # Remove this line for GPU support
  # - pytorch-cuda=11.8  # Uncomment for CUDA 11.8
  # - pytorch-cuda=12.1  # Uncomment for CUDA 12.1
  # PyTorch Geometric
  - pyg>=2.0.0
  - pip:
    # Additional pip packages if needed
    - torch-geometric>=2.0.0
